<!DOCTYPE html>
<html>
<head>
    <title>Adventures of Mr. Cubester</title>
    <link rel="icon" href="Mr-Cubester.png">
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { background: #000; border: 4px solid #333; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ui { margin-bottom: 15px; font-size: 20px; font-weight: bold; }
        .content {
        	
            text-align: center;
            background: rgba(26, 26, 26, 0.8); /* Semi-transparent bg for readability */
            padding: 40px;
            border-radius: 20px;
        }

        .menu-btn { 
            display: block;
            background: #4CAF50; 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            margin: 15px auto; 
            font-size: 20px; 
            cursor: pointer; 
            border-radius: 8px; 
            width: 200px; 
            text-decoration: none; 
            text-align: center;
            transition: transform 0.2s;
        }
    </style>
</head>
<body>
	<div class="content">
    	<a href="Adventures-of-Mr-Cubester.html" class="menu-btn">Back</a>
    </div>
    <div class="ui" id="levelDisplay">Level: 1</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const levelDisplay = document.getElementById("levelDisplay");
const dooropen = false;
/**
 * LEVEL DATA FORMAT:
 * [x, y, width, height, type, destination-x, destination-y, strength(default player jump is 12- also put in negative) range, speed, required key]
 * Types: "solid", "kill", "win", "moving-kill" (Horizontal), "moving-kill-v" (Vertical), teleporter, trampoline, moving-win, moving-win-v, moving plat, moving-plat-v, door, key
 * level dimensions are 396/800 396 tall, 800 wide
 */
const allLevels = [
    [ // Level 1
    	[0, 396, 800, 10], 
        [100, 150, 50, 250], 
        [0, 0, 1, 396], 
        [50, 300, 50, 20], 
        [0, 215, 50, 20], 
        [50, 130, 100, 20], 
        [150, 130, 50, 20, "kill"], 
        [200, 130, 100, 20],
        [300, 130, 10, 50, "moving-kill-v", "", 0, 0, 0, 100, 1],
        [310, 130, 100, 20],
        [400, 0, 10, 130, "win"],
        [800, 0, 1, 380],
        [0, 0, 800, 1],
        [],

    ],
    [ // Level 2
        [0, 396, 800, 10], //floor
        [0, 0, 1, 396], //left wall
        [800, 0, 1, 396], //right wall
        [0, 0, 800, 1], //roof
        [0, 356, 770, 10],
        [31, 316, 770, 10],
        [0, 276, 770, 10],
        [31, 236, 770, 10],
        [0, 196, 770, 10],
        [31, 156, 770, 10],
        [0, 116, 770, 10],
        [31, 76, 770, 10],
        [0, 36, 770, 10],
        [0, 0, 10, 36, "win"],
        [100, 198, 10, 50, "moving-kill-v", "", 0, 0, 0, 200, 3],
        [300, 198, 10, 50, "moving-kill-v", "", 0, 0, 0, 200, 3],
        [500, 198, 10, 50, "moving-kill-v", "", 0, 0, 0, 200, 3],
        [700, 198, 10, 50, "moving-kill-v", "", 0, 0, 0, 200, 3],
        
    ],
    [ //level 3
    	[0, 396, 800, 10], //floor
        [0, 0, 1, 396], //left wall
        [800, 0, 1, 396], //right wall
        [0, 0, 800, 1], //roof
        [50, 96, 50, 300],
        [100, 96, 100, 10],
        [47, 366, 3, 30, "teleporter", "", 170, 66],
        [300, 96, 50, 300],
        [299, 96, 1, 40, "trampoline", "", 0, 0, -17],
        [100, 390, 700, 6, "kill"],
        [500, 366, 50, 24],
        [350, 280, 1, 40, "trampoline", "", 0, 0, -18],
        [740, 40, 60, 10],
        [795, 0, 5, 40, "win"],
        [550, 366, 20, 24, "teleporter", "", 740, 5],
        
    ],
    [ //level 4
    	[0, 396, 800, 10], //floor
        [0, 0, 1, 396], //left wall
        [800, 0, 1, 396], //right wall
        [0, 0, 800, 1], //roof
        [325, 50, 50, 296],
        [475, 50, 50, 346],
        [474, 376, 1, 20, "trampoline", "", 0, 0, -17],
        [375, 200, 1, 20, "trampoline", "", 0, 0, -17],
        [50, 395, 100, 1, "reflector", "", 0, 0, -17],
        [642.5, 390, 20, 10, "moving-kill", "", 0, 0, 0, 100, 5],
        [795, 0, 5, 396, "win"],
    ],
    [ //Level 5
    	[0, 396, 800, 10], //floor
        [0, 0, 1, 396], //left wall
        [800, 0, 1, 396], //right wall
        [0, 0, 800, 1], //roof
        [250, 0, 2, 100],
        [550, 0, 2, 100],
        [0, 100, 800, 2],
        [1, 95, 249, 5, "win"],
        [252, 95, 298, 5, "kill"],
        [120, 390, 5, 6, "teleporter", "", 150, 50],
        [375, 390, 5, 6, "teleporter", "", 750, 50],
        [675, 390, 5, 6, "teleporter", "", 400, 50],
    ],
    [ //Level 6
    	[0, 396, 800, 10], //floor
        [0, 0, 1, 396], //left wall
        [800, 0, 1, 396], //right wall
        [0, 0, 800, 1], //roof
        [30, 100, 350, 10],
        [420, 100, 380, 10],
        [30, 100, 1, 296, "trampoline", "", 0, 0, -17],
        [31, 380, 769, 16, "kill"],
        [380, 200, 40, 10, "moving-win", "", 0, 0, 0, 200, 5],
    ],
    [ //Level 7
    	[0, 396, 800, 10], //floor
        [0, 0, 1, 396], //left wall
        [800, 0, 1, 396], //right wall
        [0, 0, 800, 1], //roof
		[30, 150, 1, 245, "trampoline", "", 0, 0, -17],
        [31, 150, 310, 10],
        [331, 160, 10, 60, "kill"],
        [331, 220, 310, 10, "kill"],
        [550, 150, 50, 10, "moving-platf", "", 0, 0, 0, 100, 5],
        [32, 160, 10, 235, "win"],
    ],
    [ //Level 8
    	[0, 396, 800, 10], //floor
        [0, 0, 1, 396], //left wall
        [800, 0, 1, 396], //right wall
        [0, 0, 800, 1], //roof
        //[x, y, width, height, "type", "colorofkey", destx, desty, strength, range, speed, ],
		[400, 0, 10, 100],
        [400, 150, 10, 10],
        [402.5, 160, 5.5, 233.5, "kill"],
        [0, 150, 50, 10],
        [50, 390, 50, 6, "trampoline", "", 0, 0, -22],
        [650, 0, 10, 198],
        [650, 198, 10, 198, "door", "blue"],
        [370, 90, 30, 10],
        [380, 0, 5, 5, "key", "blue"],
        [790, 0, 10, 396, "win"],
    ],
    [//Level 9
    	[0, 396, 800, 10], //floor
        [0, 0, 1, 396], //left wall
        [800, 0, 1, 396], //right wall
        [0, 0, 800, 1], //roof
        [200, 300, 10, 66],
        [240, 300, 10, 96],
        [200, 300, 50, 10],
        [400, 300, 10, 96],
        [440, 300, 10, 66],
        [400, 300, 50, 10],
        [210, 395, 30, 1, "lvl9trigger"],
    ]
];

let currentLevelIndex = 0;
let platforms = [];
// FIXED MOVEMENT SYSTEM (Input Map)
const keys = { KeyW: false, KeyA: false, KeyD: false, KeyR: false, ShiftLeft: false};
window.addEventListener("keydown", e => { if(e.code in keys) keys[e.code] = true; });
window.addEventListener("keyup", e => { if(e.code in keys) keys[e.code] = false; });
const player = {
    x: 1, y: 365, width: 30, height: 30, haskey: "", hasdshd: false,
    velX: 0, velY: 0, jumping: false, grounded: false, reflecting: false,
    speed: 5, jumpPower: -12, gravity: 0.8, friction: 0.8, lvl9anim: false
};
const evil = {
    x: 410, y: 366, width: 29, height: 30, haskey: "", hasdshd: false,
    velX: 0, velY: 0, jumping: false, grounded: false, reflecting: false,
    speed: 5, jumpPower: -12, gravity: 0.8, friction: 0.8
};
const finaldoor = {
	x: 650, y:300, width: 10, height: 96
};
const Entity = new Image();
Entity.src = "Secret.gif";
const Mr_Cubester = new Image();
Mr_Cubester.src = "Mr-Cubester.png";
const evilcube = new Image();
evilcube.src = "evilcube.png";
function loadLevel(index) {
    if (index >= allLevels.length) {
        alert("Congratulations! You've beaten all levels!");
        currentLevelIndex = 0;
        loadLevel(0);
        return;
    }
    
    levelDisplay.innerText = `Level: ${index + 1}`;
    platforms = allLevels[index].map(d => ({
        x: d[0], y: d[1], width: d[2], height: d[3], 
        type: d[4] || "solid",
        key: d[5] || "solid",
        destX: d[6], destY: d[7],
        strength: d[8],
        startX: d[0], startY: d[1],
        range: d[9] || 0, speed: d[10] || 0, time: 0
    }));
    
    player.x = 1; player.y = 365;
    player.velX = 0; player.velY = 0;
}

function checkCollision(p, plat) {
    const vX = (p.x + (p.width / 2)) - (plat.x + (plat.width / 2));
    const vY = (p.y + (p.height / 2)) - (plat.y + (plat.height / 2));
    const hWidths = (p.width / 2) + (plat.width / 2);
    const hHeights = (p.height / 2) + (plat.height / 2);

    if (Math.abs(vX) < hWidths && Math.abs(vY) < hHeights) {
        // KILL LOGIC
        if (plat.type === "kill" || plat.type === "moving-kill" || plat.type === "moving-kill-v") {
            p.x = 1; p.y = 365;
            p.velX = 0; p.velY = 0;
            return;
        }

        // WIN LOGIC
        if (plat.type === "win" || plat.type === "moving-win" || plat.type === "moving-win-v") {
            currentLevelIndex++;
            loadLevel(currentLevelIndex);
            return;
        }
		// TRAMPOLINE LOGIC
        if (plat.type === "trampoline") {
        	p.velY = plat.strength;
            player.jumping = true;
        }
        // TELEPORTER LOGIC
        if (plat.type === "teleporter") {
        	player.x = plat.destX;
            player.y = plat.destY;
        }
        // REFLECTOR LOGIC
        if (plat.type === "reflector") {
            p.velX = plat.strength;
            player.reflecting = true;
        }
        // MOVING PLATFORM LOGIC
        if (plat.type === "moving-platf") {
        	player.x = plat.x + 0.5 * plat.width - 15;
            player.grounded = true;
        }
        // KEY LOGIC
        if (plat.type === "key") {
        	player.haskey = plat.key;
        }
        //DOOR LOGIC
        if (plat.type === "door") {
        	if (player.haskey === plat.key) {
            	plat.x = plat.x + 900;
            }
        }
        //LEVEL 9 CLONE ANIMATION THINGY
        if (plat.type === "lvl9trigger") {
        	player.lvl9anim = true;
        }
        //SPINNY THING LOGIC
        // SOLID COLLISION
        const oX = hWidths - Math.abs(vX);
        const oY = hHeights - Math.abs(vY);
        if (oX >= oY) {
            if (vY > 0) { p.y += oY; p.velY = 0; }
            else { p.y -= oY; p.velY = 0; p.jumping = false; p.grounded = true; setTimeout(() => {p.hasdshd = false;}, 500);}
        } else {
            if (vX > 0) { p.x += oX; p.velX = 0; }
            else { p.x -= oX; p.velX = 0; }
        }
    }
}

function update() {
    // 1. Movement Map Processing
    if (keys.KeyW && !player.jumping && player.grounded) {
        player.jumping = true;
        player.grounded = false;
        player.velY = player.jumpPower;
    }
    if (keys.KeyA && player.velX > -player.speed) player.velX--;
    if (keys.KeyD && player.velX < player.speed) player.velX++;
    if (keys.KeyR && player.grounded) {
    	player.x = 1; player.y = 365;
    }
    if (keys.KeyR && player.jumping) {
    	player.x = 1; player.y = 365;
    }
    if (keys.KeyR && player.reflecting) {
        player.x = 1; player.y = 365;
    }
    if (keys.ShiftLeft && player.grounded && !player.hasdshd) {
    	if (player.velX > 0) {
        	player.velX = player.velX + 17;
			setTimeout(() => {
            	keys.ShiftLeft = false;
            	player.hasdshd = true;
            }, 50);
        }
        else if (player.velX < 0) {
        	player.velX = player.velX - 17;
            setTimeout(() => {
            	keys.ShiftLeft = false;
            	player.hasdshd = true;
            }, 50);
        }
    }
    if (keys.ShiftLeft && player.jumping && !player.hasdshd) {
    	if (player.velX > 0) {
        	player.velX = player.velX + 17;
			setTimeout(() => {
            	keys.ShiftLeft = false;
            	player.hasdshd = true;
            }, 50);
        }
        else if (player.velX < 0) {
        	player.velX = player.velX - 17;
			setTimeout(() => {
            	keys.ShiftLeft = false;
            	player.hasdshd = true;
            }, 50);
        }
    }
    // 2. Physics
    player.velX *= player.friction;
    player.velY += player.gravity;
    player.grounded = false;
    player.x += player.velX;
    player.y += player.velY;

    // 3. Platform Updates (Movement & Collision)
    platforms.forEach(p => {
        if (p.type === "moving-kill" || p.type === "moving-win" || p.type === "moving-platf") {
            p.time += 0.02 * p.speed;
            p.x = p.startX + Math.sin(p.time) * p.range;
        }
        if (p.type === "moving-kill-v" || p.type === "moving-win-v" || p.type === "moving-platf-v") {
            p.time += 0.02 * p.speed;
            p.y = p.startY + Math.sin(p.time) * p.range;
        }
        checkCollision(player, p);
    });

    // 4. Draw
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    platforms.forEach(p => {
        if (p.type.includes("kill")) ctx.fillStyle = "#ff0000";
        else if (p.type === "win" || p.type === "moving-win" || p.type === "moving-win-v") ctx.fillStyle = "#ffd700";
        else if (p.type === "trampoline") ctx.fillStyle = "#ffa500";
        else if (p.type === "teleporter") ctx.fillStyle = "#1889c4";
        else if (p.type === "reflector") ctx.fillStyle = "#ff0066";
        else if (p.type === "Entity") ctx.fillStyle = "#000";
        else if (p.type === "moving-platf" || p.type === "moving-platf-v") ctx.fillStyle = "#444";
        else if (p.type === "key") ctx.fillStyle = p.key;
        else if (p.type === "door") ctx.fillStyle = p.key;
        else if (p.type === "lvl9trigger") ctx.fillStyle = "#ffff";
        else ctx.fillStyle = "#444";
        ctx.fillRect(p.x, p.y, p.width, p.height);
    });
    if (currentLevelIndex === 8) {
      if (dooropen === true) {
          ctx.fillStyle = "#c97002";
          ctx.fillRect(finaldoor.x, finaldoor.y, finaldoor.width, finaldoor.height);
          finaldoor.y -= 2;
      }
      else if (dooropen === false) {
          ctx.fillStyle = "#c97002";
          ctx.fillRect(finaldoor.x, finaldoor.y, finaldoor.width, finaldoor.height);
      }
      if (player.lvl9anim === true) {
          ctx.fillStyle = "#ff0000";
          ctx.fillRect(evil.x, evil.y, evil.width, evil.height);
          if (evil.x < 600) {
              evil.x += 2;
          }
          if (evil.x >= 600 && evil.x < 700) {
              if (finaldoor.y > 200) {
                  finaldoor.y -= 2;
              }
              else if (finaldoor.y <= 200) {
                  evil.x += 2;
              }
          }
          if (evil.x === 700) {
              if (finaldoor.y < 300) {
                  finaldoor.y += 2;
              }
          }
          if (evil.x >= 700 && finaldoor.y === 300) {
              evil.x += 2;
          }
      }
      if (player.lvl9anim === true) {
          try {
              ctx.drawImage(evilcube, evil.x, evil.y, evil.width, evil.height);
          }
          catch (error) {
          }
      }
    }
    if (currentLevelIndex === 8) {
    	ctx.fillStyle = "#ffff";
    	ctx.font = "30px Arial";
    	ctx.fillText("Cloning Machine", 235, 200);
    }
    ctx.fillStyle = "#4CAF50"; // Player
    ctx.fillRect(player.x, player.y, player.width, player.height);
    try { 
    	ctx.drawImage(Mr_Cubester, player.x, player.y, player.width, player.height);
	}
    catch (error) {
    }
    if (currentLevelIndex === 4) {
    	try {
    		ctx.drawImage(Entity, 675, 45, 50, 50);
   		}
    	catch (error) {
    	}
    }
    requestAnimationFrame(update);
}
loadLevel(0);
update();
</script>
</body>
</html>
